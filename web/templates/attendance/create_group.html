<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Создание группы | Учет посещаемости</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/attendance.css') }}">
</head>
<body>
    <div class="container">
        <h1>Создание группы</h1>
        <div class="group-form">
            <div class="form-group">
                <label for="groupName">Название группы</label>
                <input type="text" id="groupName" placeholder="Введите название группы" required>
            </div>
            
            <div class="students-list" id="studentsList">
                <div class="student-input">
                    <input type="text" placeholder="Имя студента" required>
                    <button class="remove-student" title="Удалить">×</button>
                </div>
            </div>

            <div class="form-controls">
                <button id="addStudent" class="btn-add">Добавить студента</button>
                <button id="saveGroup" class="btn-save">Сохранить группу</button>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/create_group.js') }}"></script>
</body>
</html>
